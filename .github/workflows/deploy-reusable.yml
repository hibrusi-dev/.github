# =====================================================================
# Reusable workflow de despliegue — multi-VPS
# La lógica de CD vive AQUÍ una sola vez. Cada repo la invoca con un
# caller mínimo (ver workflow-templates/deploy.yml).
# ---------------------------------------------------------------------
# Soporta DOS servidores (vps1 / vps2). El destino se elige por orden:
#   1) input target  (al lanzarlo a mano: desplegable vps1/vps2)
#   2) variable de repo  DEPLOY_TARGET
#   3) 'vps1'  (por defecto)
#
# La ruta en el servidor se resuelve por orden:
#   1) input deploy_path  2) variable de repo DEPLOY_PATH
#   3) <DEPLOY_BASE>/<nombre-del-repo>   (DEPLOY_BASE por defecto /root)
#
# Configuración (una sola vez, a nivel de ORGANIZACIÓN):
#   Secrets por VPS:  VPS1_HOST VPS1_USER VPS1_SSH_KEY VPS1_PORT(opc)
#                     VPS2_HOST VPS2_USER VPS2_SSH_KEY VPS2_PORT(opc)
#   Vars:  DEPLOY_BASE (p. ej. /root),  DEPLOY_ENABLED = true
#          DEPLOY_TARGET (opcional, por repo: vps1 o vps2)
# El job solo se ejecuta si DEPLOY_ENABLED == 'true'.
# =====================================================================
name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      target:
        description: "VPS destino: vps1 o vps2 (vacío = usa DEPLOY_TARGET o vps1)."
        type: string
        required: false
        default: ""
      deploy_path:
        description: "Ruta del repo en el servidor (opcional)."
        type: string
        required: false
        default: ""
      branch:
        description: "Rama a desplegar."
        type: string
        required: false
        default: "main"

jobs:
  deploy:
    name: Desplegar en ${{ inputs.target || vars.DEPLOY_TARGET || 'vps1' }}
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    concurrency:
      group: deploy-${{ github.repository }}
      cancel-in-progress: false
    env:
      TARGET: ${{ inputs.target || vars.DEPLOY_TARGET || 'vps1' }}
    steps:
      - name: Validar destino
        run: |
          echo "==> Repo ${{ github.event.repository.name }} -> destino: $TARGET"
          if [ "$TARGET" != "vps1" ] && [ "$TARGET" != "vps2" ]; then
            echo "::error::Destino desconocido '$TARGET' (usa vps1 o vps2)"; exit 1
          fi

      - name: Desplegar en VPS1
        if: ${{ env.TARGET == 'vps1' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT || 22 }}
          envs: REPO_NAME,IN_PATH,VAR_PATH,IN_BASE,IN_BRANCH
          script: |
            set -euo pipefail
            DPATH="${IN_PATH:-${VAR_PATH:-${IN_BASE:-/root}/$REPO_NAME}}"
            echo "==> Desplegando $REPO_NAME en $DPATH (rama $IN_BRANCH)"
            cd "$DPATH"
            git fetch --all --prune
            git reset --hard "origin/$IN_BRANCH"
            docker compose up -d --build --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          IN_PATH: ${{ inputs.deploy_path }}
          VAR_PATH: ${{ vars.DEPLOY_PATH }}
          IN_BASE: ${{ vars.DEPLOY_BASE }}
          IN_BRANCH: ${{ inputs.branch }}

      - name: Desplegar en VPS2
        if: ${{ env.TARGET == 'vps2' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          port: ${{ secrets.VPS2_PORT || 22 }}
          envs: REPO_NAME,IN_PATH,VAR_PATH,IN_BASE,IN_BRANCH
          script: |
            set -euo pipefail
            DPATH="${IN_PATH:-${VAR_PATH:-${IN_BASE:-/root}/$REPO_NAME}}"
            echo "==> Desplegando $REPO_NAME en $DPATH (rama $IN_BRANCH)"
            cd "$DPATH"
            git fetch --all --prune
            git reset --hard "origin/$IN_BRANCH"
            docker compose up -d --build --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          IN_PATH: ${{ inputs.deploy_path }}
          VAR_PATH: ${{ vars.DEPLOY_PATH }}
          IN_BASE: ${{ vars.DEPLOY_BASE }}
          IN_BRANCH: ${{ inputs.branch }}
